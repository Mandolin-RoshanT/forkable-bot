name: Weekly meal picker

on:
  # Friday 4pm PDT (= 23:00 UTC). One hour off during standard time but the
  # cutoff window is wide enough that it doesn't matter.
  schedule:
    - cron: '0 23 * * 5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry-run (preview) or pick (live swap)'
        type: choice
        options: [dry-run, pick]
        default: dry-run

# Block overlapping runs (a manual dispatch during the cron, etc.) but don't
# cancel the in-flight one — a half-applied swap is worse than waiting.
concurrency:
  group: forkable-bot
  cancel-in-progress: false

# The post-run step pushes the freshly-written runs/<from>.csv back to
# the repo.
permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORKABLE_EMAIL: ${{ secrets.FORKABLE_EMAIL }}
      FORKABLE_PASSWORD: ${{ secrets.FORKABLE_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NOTIFY_TO_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}
      # NOTIFY_FROM_EMAIL omitted — defaults to onboarding@resend.dev in
      # src/config.ts. Set the secret + restore this line if you switch
      # to a verified custom domain in Resend.
    steps:
      # Defensive masking so the password can't leak into logs even if a
      # later step echoes process.env.
      - name: Mask password
        run: echo "::add-mask::${{ secrets.FORKABLE_PASSWORD }}"

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - run: bun install --frozen-lockfile

      # Cron has no `inputs.mode` so we default to dry-run during the M4
      # validation window. Flip this default to `pick` once we've watched
      # a full week of dry-runs match Roshan's manual picks.
      - name: Run picker
        run: bun src/index.ts ${{ inputs.mode || 'dry-run' }}

      # The picker writes runs/<from>.csv where <from> is the Monday of
      # the targeted delivery week. Find that file (the newest .csv in
      # runs/) and upload only it — past weeks' files stay in the repo,
      # not in this run's artifact zip.
      - name: Identify this run's CSV
        if: always()
        id: run_csv
        run: |
          LATEST=$(ls -t runs/*.csv 2>/dev/null | head -n1)
          echo "path=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Upload this run's CSV (artifact)
        if: always() && steps.run_csv.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: run-history-${{ github.run_id }}
          path: ${{ steps.run_csv.outputs.path }}
          retention-days: 90

      # Commit only this run's per-week CSV back to the repo. Past weeks'
      # files (committed by previous runs) are left as-is. Skipped on
      # failure so a half-state file never lands on main.
      - name: Commit this run's CSV
        if: success()
        run: |
          git config user.name 'forkable-bot'
          git config user.email '${{ github.actor }}@users.noreply.github.com'
          git add runs/
          if git diff --staged --quiet; then
            echo "no run-csv changes to commit"
          else
            git commit -m "chore(runs): log picks for $(date -u +%Y-%m-%d)"
            git push
          fi
